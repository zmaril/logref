fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[scripts]
# The reproducer harness entry points live beside their scenarios under
# reproducers/, not scripts/ — deliberate keepers. run.sh drives Tiers 1-2;
# env-run.sh + lib.sh drive the Tier 3-4 env variants; env/entrypoint.sh is the
# env-variant image's entrypoint. The bench build script lives beside the
# browser-benchmark demo it builds (bench/README points at it).
allow = [
    "reproducers/run.sh",
    "reproducers/lib.sh",
    "reproducers/env-run.sh",
    "reproducers/sql-caps.sh",
    "reproducers/env/entrypoint.sh",
    "reproducers/scenarios/54_pitr_restore.sh",
    "reproducers/scenarios/55_checkpoint_bgwriter.sh",
    "reproducers/scenarios/56_standby_conflict.sh",
    "reproducers/scenarios/57_wal_control_states.sh",
    "reproducers/repl-run.sh",
    "reproducers/scenarios/58_repl_physical.sh",
    "reproducers/scenarios/59_repl_slots.sh",
    "reproducers/scenarios/60_logical_decoding.sh",
    "reproducers/scenarios/61_pub_sub.sh",
    "reproducers/contrib-caps.sh",
    "reproducers/scenarios/50_txn_concurrency.sh",
    "crates/logref-wasm/bench/build.sh",
]
