# Static serving for the LogRef bundle. The generator emits explicit `.html`
# pages (index.html, messages/<slug>.html), so links resolve directly; the
# `$uri.html` fallback additionally accepts extension-less clean URLs, and any
# unmatched path returns a real 404.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long-cache the fingerprint-free assets modestly; they are small and
    # regenerated on every deploy. `.wasm` is the scanner module the scan page
    # fetches (nginx's stock mime.types already maps it to application/wasm,
    # which streaming compilation requires).
    location ~* \.(css|js|json|wasm)$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
