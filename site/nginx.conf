# Static serving for the LogRef bundle. The generator emits explicit `.html`
# pages (index.html, messages/<slug>.html), so links resolve directly; the
# `$uri.html` fallback additionally accepts extension-less clean URLs, and any
# unmatched path returns a real 404.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress the wire. The stock nginx image ships with gzip off, so without
    # this every asset went out raw — including the scanner module, by far the
    # largest payload (~1.2 MB raw → ~450 KB gzipped). text/html is always
    # included when gzip is on; gzip_types adds the rest of what we serve.
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_types      application/wasm application/javascript text/css
                    application/json image/svg+xml;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long-cache the fingerprint-free assets modestly; they are small and
    # regenerated on every deploy. `.wasm` is the scanner module the scan page
    # fetches (nginx's stock mime.types already maps it to application/wasm,
    # which streaming compilation requires).
    location ~* \.(css|js|json|wasm)$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
