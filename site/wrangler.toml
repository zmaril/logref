# Cloudflare Pages configuration for the LogRef reference site.
#
# The static bundle is produced by `bun run build` (see package.json), which
# writes every page into `dist/`. Deploy it with:
#
#   bunx wrangler pages deploy dist --project-name logref
#
# `pages_build_output_dir` lets `wrangler pages deploy` (run from this `site/`
# directory) find the bundle without repeating the path. See DEPLOY.md for the
# credentials Cloudflare needs and the full first-time flow.

name = "logref"
pages_build_output_dir = "dist"
compatibility_date = "2025-07-10"
