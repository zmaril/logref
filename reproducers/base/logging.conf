# LogRef reproducer logging configuration.
#
# The point of this file is ground-truth provenance: every log line must carry
# the source location (file + line) and SQLSTATE of the call site that emitted
# it, so the coverage join can map captured lines back to catalog entries. The
# same file is appended to postgresql.conf by both the Docker entrypoint and the
# direct-build measurement path (reproducers/run.sh).

# jsonlog (PG15+) emits structured records with file_name, file_line_num,
# func_name, error_severity, and state (SQLSTATE) — this is the join key.
log_destination = 'jsonlog'
logging_collector = on
log_directory = 'log'
# jsonlog swaps a trailing .log for .json, so this yields reproducer.json.
log_filename = 'reproducer.log'
# One stable file so the driver knows exactly what to read; truncate on start.
log_truncate_on_rotation = on
log_rotation_age = 0
log_rotation_size = 0

# verbose adds file_name/file_line_num/func_name to every record — required for
# the catalog join.
log_error_verbosity = verbose

# Crank the surface as wide as it goes. debug1 here; the driver can override to
# debug5 for a maximum-coverage pass.
log_min_messages = debug1
log_min_error_statement = debug1

# Log everything a session does, plus lifecycle events that fire the Tier-1
# boot/connection/checkpoint/autovacuum call sites for free.
log_statement = 'all'
log_connections = on
log_disconnections = on
log_checkpoints = on
log_autovacuum_min_duration = 0

# Make autovacuum and the background writer active so their LOG sites fire
# during a short run.
autovacuum = on
autovacuum_naptime = 1s
