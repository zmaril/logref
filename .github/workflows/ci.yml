name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

# Each job runs only when files it depends on changed, gated off the `changes`
# filter. Job-level `if:` (not a workflow `paths:` filter) on purpose: a job
# skipped by `if:` reports "skipped", which a required status check treats as
# success — so a site-only PR still satisfies the required Rust checks (and
# vice-versa), whereas a `paths:` filter would leave the check pending forever.
jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            site:
              - 'site/**'
              - '.github/workflows/ci.yml'

  rust:
    name: rust workspace
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  site:
    name: site
    needs: changes
    if: needs.changes.outputs.site == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun test
      - run: bun run build
