name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

# Each job runs only when files it depends on changed, gated off the `changes`
# filter. Job-level `if:` (not a workflow `paths:` filter) on purpose: a job
# skipped by `if:` reports "skipped", which a required status check treats as
# success — so a site-only PR still satisfies the required Rust checks (and
# vice-versa), whereas a `paths:` filter would leave the check pending forever.
jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            # The site builds + bundles the wasm scanner from crates/, so crate
            # changes must rebuild the site job too.
            site:
              - 'site/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/build-wasm-web.sh'
              - '.github/workflows/ci.yml'

  rust:
    name: rust workspace
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  site:
    name: site
    needs: changes
    if: needs.changes.outputs.site == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Must match the wasm-bindgen crate version in Cargo.lock — the CLI
      # refuses to process a module built against a different version.
      WASM_BINDGEN_VERSION: 0.2.126
      # binaryen release for the wasm-opt size pass in build-wasm-web.sh.
      BINARYEN_VERSION: "131"
      # Production must never silently ship the unoptimized module.
      WASM_OPT_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      # The scan page runs the real Rust scanner compiled to wasm, so the site
      # build needs the Rust toolchain + the pinned wasm-bindgen CLI.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-bindgen-cli (pinned)
        run: |
          V="$WASM_BINDGEN_VERSION"
          curl -sSfL "https://github.com/wasm-bindgen/wasm-bindgen/releases/download/${V}/wasm-bindgen-${V}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --strip-components=1 -C "$HOME/.cargo/bin" "wasm-bindgen-${V}-x86_64-unknown-linux-musl/wasm-bindgen" \
            || cargo install wasm-bindgen-cli --version "$V" --locked
          wasm-bindgen --version
      - name: install binaryen (pinned)
        run: |
          V="$BINARYEN_VERSION"
          { curl -sSfL "https://github.com/WebAssembly/binaryen/releases/download/version_${V}/binaryen-version_${V}-x86_64-linux.tar.gz" \
              | tar -xz --strip-components=2 -C "$HOME/.cargo/bin" "binaryen-version_${V}/bin/wasm-opt" \
              && wasm-opt --version ; } \
            || { npm install -g "binaryen@${V}" && wasm-opt --version ; }
      - run: bash scripts/build-wasm-web.sh
      - run: bun install
        working-directory: site
      - run: bunx @biomejs/biome check .
        working-directory: site
      - run: bun test
        working-directory: site
      - run: bun run build
        working-directory: site
